<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mulher de Valor</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .capa {
            width: 100%;
            height: 100vh;
            background: url('logo-512.png') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 40px;
        }

        .console-container {
            background: rgba(0, 0, 0, 0.85);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #d4af37;
            text-align: center;
            width: 85%;
            max-width: 350px;
        }

        h1 {
            font-size: 20px;
            margin: 0 0 20px 0;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #d4af37;
            background: transparent;
            color: white;
            border-radius: 5px;
            text-align: center;
            font-size: 16px;
            box-sizing: border-box;
        }

        input::placeholder {
            color: #aaa;
        }

        .btn-entrar {
            display: block;
            background: #d4af37;
            color: #000;
            border: none;
            padding: 15px;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-entrar:active {
            background: #b8962e;
        }
    </style>
</head>
<body>

    <div class="capa">
        <div class="console-container">
            <h1>Mulher de Valor</h1>
            
            <input type="text" id="nomeUsuario" placeholder="Digite seu nome aqui..." required>
            
            <a href="1.html" class="btn-entrar" onclick="salvarNome()">ENTRAR</a>
        </div>
    </div>

    <script>
        function salvarNome() {
            const nome = document.getElementById('nomeUsuario').value;
            if(nome) {
                localStorage.setItem('nomeMulherDeValor', nome);
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
